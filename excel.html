        function addTeacher() {
            const id = document.getElementById('newTchrId').value.trim().toUpperCase();
            const name = document.getElementById('newTchrName').value.trim();
            const min = document.getElementById('newTchrMin').value.trim().toUpperCase() || id.slice(0, 2);
            if (!id) { showToast('Enter teacher ID', 'error'); return; }
            if (!name) { showToast('Enter teacher name', 'error'); return; }
            if (appData.teachers[id]) { showToast('Teacher already exists', 'error'); return; }
            appData.teachers[id] = { name, minimalId: min };
            closeModal();
            render();
            showToast('Added teacher ' + id);
            saveData();
            manageTeachers();
        }

        function removeTeacher(id) {
            if (!confirm('Remove teacher ' + id + '?')) return;
            delete appData.teachers[id];
            // Also clear from timetable
            appData.classSections.forEach(c => {
                DAYS.forEach(d => {
                    const pCount = getPeriodsPerDay();
                    for (let p = 1; p <= pCount; p++) {
                        const key = 'P' + p;
                        const val = getCellValue(c, d, key);
                        if (val.teacher === id) {
                            clearCell(c, d, key);
                        }
                    }
                });
                if (appData.classTeachers[c] === id) {
                    delete appData.classTeachers[c];
                }
            });
            closeModal();
            render();
            showToast('Removed ' + id);
            saveData();
            manageTeachers();
        }

        // ───────────── CLEAR ALL ─────────────
        function clearAll() {
            if (!confirm('⚠️ Clear all timetable data? This cannot be undone.')) return;
            if (!confirm('Are you sure?')) return;
            appData.timetable = {};
            appData.classSections.forEach(c => {
                appData.timetable[c] = {};
                DAYS.forEach(d => {
                    appData.timetable[c][d] = {};
                    const pCount = getPeriodsPerDay();
                    for (let p = 1; p <= pCount; p++) {
                        appData.timetable[c][d]['P' + p] = { subject: null, teacher: null };
                    }
                });
            });
            render();
            showToast('Cleared all data');
            saveData();
        }

        // ───────────── APPLY TO ALL DAYS (toolbar) ─────────────
        function applyToAllDays(classKey, period, subject, teacher) {
            DAYS.forEach(d => {
                setCellValue(classKey, d, period, subject, teacher);
            });
            render();
            showToast('Applied to all days');
            saveData();
        }

        // ───────────── PERIODS PER DAY CHANGE ─────────────
        document.getElementById('periodsPerDay').addEventListener('change', function() {
            const val = parseInt(this.value) || 7;
            const clamped = Math.min(10, Math.max(4, val));
            this.value = clamped;
            appData.settings.periodsPerDay = clamped;
            // Ensure all classes have the new periods
            appData.classSections.forEach(c => {
                if (!appData.timetable[c]) appData.timetable[c] = {};
                DAYS.forEach(d => {
                    if (!appData.timetable[c][d]) appData.timetable[c][d] = {};
                    for (let p = 1; p <= clamped; p++) {
                        const key = 'P' + p;
                        if (!appData.timetable[c][d][key]) {
                            appData.timetable[c][d][key] = { subject: null, teacher: null };
                        }
                    }
                });
            });
            render();
            saveData();
            showToast('Periods per day set to ' + clamped);
        });

        // ───────────── TOGGLE BARS ─────────────
        document.getElementById('topBarToggle').addEventListener('click', function() {
            const bar = document.getElementById('topBar');
            bar.classList.toggle('collapsed');
            this.textContent = bar.classList.contains('collapsed') ? '▸' : '▾';
        });
        document.getElementById('bottomBarToggle').addEventListener('click', function() {
            const bar = document.getElementById('bottomBar');
            bar.classList.toggle('collapsed');
            this.textContent = bar.classList.contains('collapsed') ? '▸' : '▾';
        });
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            const bar = document.getElementById('rightSidebar');
            bar.classList.toggle('collapsed');
            this.textContent = bar.classList.contains('collapsed') ? '▶' : '◀';
        });

        // ───────────── IMPORT BUTTONS ─────────────
        document.getElementById('btnImport').addEventListener('click', function() {
            const type = prompt('Import type: classes, subjects, teachers');
            if (!type) return;
            if (!['classes', 'subjects', 'teachers'].includes(type)) {
                showToast('Type must be: classes, subjects, teachers', 'error');
                return;
            }
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv';
            input.onchange = function(e) {
                if (this.files && this.files[0]) {
                    importCSV(this.files[0], type);
                }
            };
            input.click();
        });

        document.getElementById('btnExport').addEventListener('click', exportCSV);
        document.getElementById('btnSettings').addEventListener('click', openSettings);
        document.getElementById('btnManageClasses').addEventListener('click', manageClasses);
        document.getElementById('btnManageSubjects').addEventListener('click', manageSubjects);
        document.getElementById('btnManageTeachers').addEventListener('click', manageTeachers);
        document.getElementById('btnClearAll').addEventListener('click', clearAll);

        // ───────────── INIT ─────────────
        function init() {
            const hasData = loadData();
            if (!hasData || appData.classSections.length === 0) {
                initSampleData();
                saveData();
            }
            // Ensure all classes have timetable entries
            appData.classSections.forEach(c => {
                if (!appData.timetable[c]) {
                    appData.timetable[c] = {};
                    DAYS.forEach(d => {
                        appData.timetable[c][d] = {};
                        const pCount = getPeriodsPerDay();
                        for (let p = 1; p <= pCount; p++) {
                            appData.timetable[c][d]['P' + p] = { subject: null, teacher: null };
                        }
                    });
                }
            });
            document.getElementById('periodsPerDay').value = getPeriodsPerDay();
            render();
            saveData();

            // auto-save every 30s
            setInterval(() => { saveData(); }, 30000);
        }

        // ───────────── START ─────────────
        document.addEventListener('DOMContentLoaded', init);
        // close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // keyboard shortcut: Escape to close modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                document.getElementById('contextMenu').style.display = 'none';
                stopEditing();
            }
        });

        console.log('🏫 School Timetable Manager loaded.');
        console.log('📊 Data version:', dataVersion);
        console.log('📚 Classes:', appData.classSections.length);
        console.log('👨‍🏫 Teachers:', Object.keys(appData.teachers).length);
        console.log('📖 Subjects:', Object.keys(appData.subjects).length);
    </script>
